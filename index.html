<!doctype html>
<html lang="en"> 
 <head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <meta http-equiv="X-UA-Compatible" content="ie=edge"> 
  <title>Niton, Software Archive</title> <!-- Bootstrap 4 CSS --> 
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"> 
  <style>
      body {
        background-color: #121212;
        color: #f8f8f8;
        text-align: center;
      }
      .card {
        background-color: #1f1f1f;
        color: #f8f8f8;
      }
      .form-control {
        background-color: #333333;
        color: #f8f8f8;
      }
      .btn-primary {
        background-color: #007bff;
        border-color: #007bff;
      }
      .btn-primary:hover {
        background-color: #0069d9;
        border-color: #0062cc;
      }
      .custom-input {
    background-color: #f8f8f8;
    color: #333333;
    font-size: 18px;
    border: none;
    border-radius: 5px;
    padding: 10px;
    box-shadow: none;
  }
  .custom-input:focus {
    outline: none;
  }
  .toast {
    color: #333;
  }
    </style> 
 </head> 
 <body> 
  <header class="py-3 bg-dark text-white text-center"> 
   <div class="container"> 
    <h1 class="display-6">Software Archive</h1> 
    <p>Repository for Debian/Ubuntu software written by <a href="http://github.com/nitondev/">niton</a></p> 
   </div> 
  </header> 
  <div class="position-fixed top-0 right-0 p-3" style="position: absolute; top: 0; right: 0;"> 
   <div id="liveToast" class="toast hide" role="alert" aria-live="assertive" aria-atomic="true" data-delay="3000"> 
    <div class="toast-header"> 
     <img src="https://niton.dev/img/favicon-16x16.png" class="rounded mr-2" alt="..."> <strong class="mr-auto">Software Archive</strong> <small>just now</small> <button type="button" class="ml-2 mb-1 close" data-dismiss="toast" aria-label="Close"> <span aria-hidden="true">×</span> </button> 
    </div> 
    <div class="toast-body">
      Commands has been copied to clipboard. 
    </div> 
   </div> 
  </div> 
  <div class="container mt-4 text-center"> 
   <div class="card"> 
    <div class="card-body"> 
     <h2 class="card-title text-left">Usage:</h2> 
     <div class="form-group"> <label for="instructions">Open a terminal window and enter the following commands:</label> <textarea id="command" class="form-control custom-input" readonly>Temporary unavailable</textarea> 
     </div> <button id="copy" class="btn btn-primary btn-block">Copy to clipboard</button> 
    </div> 
   </div> 
  </div> <a href="https://niton.dev/"><img src="https://img.shields.io/badge/niton-dev%20-blue"></a> 
  <img alt="Uptime last 30 days." src="https://img.shields.io/uptimerobot/ratio/m793315806-fc2e44be9967a0acf35bd4ab"> <!-- Bootstrap 4 JS --> 
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script> 
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script> 
  <script>
    $(document).ready(function() {
  $('#copy').click(function() {
    var textarea = document.getElementById("command");
    textarea.select();
    document.execCommand("copy");
    $('.toast').toast('show');
  });
});
  
  </script> 
 </body>
</html>
